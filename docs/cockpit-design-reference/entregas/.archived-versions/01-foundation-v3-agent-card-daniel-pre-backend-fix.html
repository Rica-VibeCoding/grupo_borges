document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n}\n:root[data-theme=\"light\"] {\n  --bg:               #eef1f5;\n  --panel:            #e8ecf2;\n  --card:             #f4f6f9;\n  --card-2:           #e0e4ea;\n  --border:           #c4cdd8;\n  --border-subtle:    #d4dbe4;\n\n  --text:             #0a1628;\n  --muted:            #5a6a7e;\n\n  --accent:           #0097a7;\n  --accent-active:    #00838f;\n  --accent-secondary: #00bcd4;\n  --accent-subtle:    rgba(0, 151, 167, 0.08);\n  --accent-border:    rgba(0, 151, 167, 0.25);\n\n  --status-running:   #0097a7;\n  --status-idle:      #5a6a7e;\n  --status-blocked:   #c45000;\n  --status-done:      #2e7d52;\n  --status-offline:   #98a4b3;\n\n  --glow-card:        0 1px 2px rgba(10, 22, 40, 0.06);\n  --glow-hover:       0 0 6px rgba(0, 151, 167, 0.25);\n  --glow-focus:       0 0 4px rgba(0, 151, 167, 0.40);\n\n  --grid-line:        rgba(10, 22, 40, 0.04);\n  --hud-mark:         rgba(0, 151, 167, 0.45);\n}\n\n/* ============================================================\n   BASE\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { height: 100%; }\nbody {\n  background: var(--bg);\n  color: var(--text);\n  font-family: 'Geist', system-ui, sans-serif;\n  font-feature-settings: 'ss01';\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  transition: background-color 180ms ease, color 180ms ease;\n  min-height: 100vh;\n  position: relative;\n  overflow-x: hidden;\n}\n\n/* Background HUD texture — dot grid + horizontal sweep */\nbody::before {\n  content: \"\";\n  position: fixed; inset: 0;\n  background-image:\n    linear-gradient(to right, var(--grid-line) 1px, transparent 1px),\n    linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);\n  background-size: 48px 48px;\n  pointer-events: none;\n  z-index: 0;\n}\nbody::after {\n  content: \"\";\n  position: fixed; inset: 0;\n  background:\n    radial-gradient(ellipse at 20% 0%, rgba(0,240,255,0.04), transparent 50%),\n    radial-gradient(ellipse at 100% 100%, rgba(0,184,212,0.03), transparent 50%);\n  pointer-events: none;\n  z-index: 0;\n}\n:root[data-theme=\"light\"] body::after { display: none; }\n\n/* Mono helpers */\n.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'zero','ss02'; }\n.cap  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 500; }\n.cap-accent { color: var(--accent); }\n.num { font-variant-numeric: tabular-nums; }\n\n/* ============================================================\n   PAGE CHROME\n   ============================================================ */\n.viewport {\n  position: relative; z-index: 1;\n  min-height: 100vh;\n  padding: 24px 32px 40px;\n  display: flex; flex-direction: column; gap: 28px;\n}\n\n/* Four corner L-marks at viewport */\n.corner-mark {\n  position: fixed;\n  width: 16px; height: 16px;\n  border-color: var(--hud-mark);\n  z-index: 2;\n  pointer-events: none;\n}\n.corner-mark.tl { top: 12px; left: 12px; border-top: 1px solid; border-left: 1px solid; }\n.corner-mark.tr { top: 12px; right: 12px; border-top: 1px solid; border-right: 1px solid; }\n.corner-mark.bl { bottom: 12px; left: 12px; border-bottom: 1px solid; border-left: 1px solid; }\n.corner-mark.br { bottom: 12px; right: 12px; border-bottom: 1px solid; border-right: 1px solid; }\n\n/* TOP BAR */\n.topbar {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 10px 14px;\n  border: 1px solid var(--border);\n  background: linear-gradient(180deg, var(--panel), transparent);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px;\n}\n.topbar-left { display: flex; align-items: center; gap: 24px; }\n.brand { display: flex; align-items: baseline; gap: 8px; }\n.brand-glyph {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 22px; height: 22px;\n  border: 1px solid var(--accent-border);\n  color: var(--accent);\n  font-size: 11px; font-weight: 700;\n  letter-spacing: -0.04em;\n  position: relative;\n}\n.brand-glyph::before {\n  content: \"\"; position: absolute; inset: -3px;\n  border-top: 1px solid var(--accent-border);\n  border-bottom: 1px solid var(--accent-border);\n  border-left: 0; border-right: 0;\n  pointer-events: none;\n}\n.brand-title { font-weight: 600; color: var(--text); letter-spacing: 0.04em; text-transform: uppercase; }\n.brand-sub { color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-size: 10px; }\n\n.topbar-meta { display: flex; align-items: center; gap: 18px; color: var(--muted); }\n.topbar-meta .item { display: flex; align-items: center; gap: 6px; }\n.topbar-meta .item .k { color: var(--muted); opacity: 0.6; }\n.topbar-meta .item .v { color: var(--text); }\n.topbar-meta .sep { color: var(--border); }\n\n.topbar-right { display: flex; align-items: center; gap: 14px; }\n.live-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--accent);\n  box-shadow: 0 0 6px var(--accent);\n  animation: pulse-soft 2.2s ease-in-out infinite;\n}\n.theme-toggle {\n  display: inline-flex; gap: 0;\n  border: 1px solid var(--border);\n  background: var(--panel);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.12em;\n}\n.theme-toggle button {\n  background: transparent; border: 0;\n  color: var(--muted);\n  padding: 5px 10px;\n  cursor: pointer;\n  text-transform: uppercase;\n  font: inherit;\n  transition: color 120ms ease, background 120ms ease;\n}\n.theme-toggle button[aria-pressed=\"true\"] {\n  color: var(--bg);\n  background: var(--accent);\n}\n:root[data-theme=\"light\"] .theme-toggle button[aria-pressed=\"true\"] { color: #f4f6f9; }\n.theme-toggle button:hover:not([aria-pressed=\"true\"]) { color: var(--text); }\n\n/* SECTION LABEL */\n.section-label {\n  display: flex; align-items: center; gap: 14px;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n.section-label .num-tag {\n  color: var(--accent);\n  border: 1px solid var(--accent-border);\n  padding: 2px 7px;\n  letter-spacing: 0.1em;\n}\n.section-label .rule { flex: 1; height: 1px; background: var(--border); }\n.section-label .endcap { color: var(--muted); opacity: 0.6; }\n\n/* GRID */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(0, 1fr));\n  gap: 18px;\n}\n.grid .span-2 { grid-column: span 2; }\n@media (max-width: 1180px) {\n  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }\n  .grid .span-2 { grid-column: span 2; }\n}\n\n/* ============================================================\n   AGENT CARD\n   ============================================================ */\n.agent-card {\n  position: relative;\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-radius: 6px;\n  overflow: hidden;\n  box-shadow: var(--glow-card);\n  padding: 0;\n  display: grid;\n  grid-template-columns: 4px 1fr;\n  transition: border-color 160ms ease, box-shadow 220ms ease, background 160ms ease;\n  isolation: isolate;\n}\n.agent-card:hover { border-color: var(--accent-border); box-shadow: var(--glow-hover); }\n\n.agent-card[data-state=\"running\"] { border-color: rgba(0,240,255,0.35); box-shadow: 0 0 0 1px rgba(0,240,255,0.05), 0 0 14px rgba(0,240,255,0.10); animation: card-breathe 4.2s ease-in-out infinite; }\n.agent-card[data-state=\"blocked\"] { border-color: rgba(255,107,53,0.30); box-shadow: 0 0 12px rgba(255,107,53,0.10); }\n.agent-card[data-state=\"offline\"] { opacity: 0.62; }\n.agent-card[data-state=\"offline\"]:hover { opacity: 0.85; }\n\n/* Status rail — the \"vein\" */\n.rail {\n  background: var(--rail-color);\n  position: relative;\n  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.0);\n}\n.agent-card[data-state=\"running\"] .rail { background: var(--status-running); box-shadow: 0 0 8px rgba(0,240,255,0.45); }\n.agent-card[data-state=\"idle\"]    .rail { background: var(--status-idle); opacity: 0.35; }\n.agent-card[data-state=\"blocked\"] .rail { background: var(--status-blocked); box-shadow: 0 0 8px rgba(255,107,53,0.45); }\n.agent-card[data-state=\"done\"]    .rail { background: var(--status-done); box-shadow: 0 0 6px rgba(100,255,218,0.40); }\n.agent-card[data-state=\"offline\"] .rail { background: var(--status-offline); }\n\n.rail::before, .rail::after {\n  content: \"\"; position: absolute; left: 0; right: 0;\n  height: 1px;\n  background: var(--bg);\n}\n.rail::before { top: 14px; }\n.rail::after  { bottom: 14px; }\n\n.card-body { padding: 14px 16px 12px; display: flex; flex-direction: column; gap: 12px; min-width: 0; }\n\n/* Multi-instance pill row (shown only when expanded) */\n.instance-row {\n  display: flex; align-items: center; gap: 6px;\n  padding: 8px 0 10px;\n  margin-bottom: 2px;\n  border-bottom: 1px dashed var(--border-subtle);\n  flex-wrap: wrap;\n}\n.instance-row .row-label {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9.5px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: var(--muted);\n  margin-right: 4px;\n}\n.pill {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 4px 10px 4px 8px;\n  border: 1px solid var(--border);\n  background: var(--card-2);\n  color: var(--muted);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  letter-spacing: 0.04em;\n  cursor: pointer;\n  transition: all 140ms ease;\n}\n.pill .pdot { width: 5px; height: 5px; border-radius: 50%; flex: none; }\n.pill[data-pstate=\"running\"] .pdot { background: var(--status-running); box-shadow: 0 0 4px var(--status-running); }\n.pill[data-pstate=\"blocked\"] .pdot { background: var(--status-blocked); }\n.pill[data-pstate=\"idle\"]    .pdot { background: var(--status-idle); opacity: 0.6; }\n.pill:hover { border-color: var(--accent-border); color: var(--text); }\n.pill[aria-selected=\"true\"] {\n  border-color: var(--accent);\n  color: var(--accent);\n  background: var(--accent-subtle);\n  box-shadow: 0 0 8px rgba(0,240,255,0.20), inset 0 0 0 1px rgba(0,240,255,0.10);\n}\n.pill-add {\n  padding: 4px 9px;\n  border: 1px dashed var(--border);\n  background: transparent;\n  color: var(--muted);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px;\n  cursor: pointer;\n}\n.pill-add:hover { color: var(--accent); border-color: var(--accent-border); }\n\n/* Card HEADER */\n.card-head { display: flex; align-items: flex-start; gap: 12px; }\n.avatar {\n  width: 38px; height: 38px; flex: none;\n  display: flex; align-items: center; justify-content: center;\n  background: var(--bg);\n  border: 1px solid var(--border);\n  color: var(--text);\n  font-family: 'JetBrains Mono', monospace;\n  font-weight: 700;\n  font-size: 13px;\n  letter-spacing: 0.02em;\n  position: relative;\n}\n.avatar::before, .avatar::after {\n  content: \"\"; position: absolute;\n  width: 4px; height: 4px;\n  border-color: var(--accent-border);\n}\n.avatar::before { top: -1px; left: -1px; border-top: 1px solid; border-left: 1px solid; }\n.avatar::after  { bottom: -1px; right: -1px; border-bottom: 1px solid; border-right: 1px solid; }\n.agent-card[data-state=\"running\"] .avatar::before,\n.agent-card[data-state=\"running\"] .avatar::after { border-color: var(--accent); }\n\n.head-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }\n.head-toprow { display: flex; align-items: center; gap: 8px; }\n.agent-name { font-family: 'Geist', sans-serif; font-weight: 600; font-size: 14px; color: var(--text); letter-spacing: -0.005em; }\n.agent-slug { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 11px; }\n.agent-slug::before { content: \"//\"; opacity: 0.5; margin-right: 4px; }\n.agent-role { font-family: 'Geist', sans-serif; color: var(--muted); font-size: 11.5px; line-height: 1.35; }\n\n/* Status block on the right of header */\n.status-block { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex: none; }\n.status-bar {\n  display: inline-flex; align-items: center; gap: 7px;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  padding: 4px 8px 4px 8px;\n  border: 1px solid var(--border);\n  color: var(--muted);\n}\n.status-bar .sdot {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: var(--status-idle);\n  flex: none;\n  position: relative;\n}\n.agent-card[data-state=\"running\"] .status-bar { color: var(--accent); border-color: var(--accent-border); background: var(--accent-subtle); }\n.agent-card[data-state=\"running\"] .status-bar .sdot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: dot-pulse 1.6s ease-in-out infinite; }\n.agent-card[data-state=\"blocked\"] .status-bar { color: var(--status-blocked); border-color: rgba(255,107,53,0.30); }\n.agent-card[data-state=\"blocked\"] .status-bar .sdot { background: var(--status-blocked); box-shadow: 0 0 5px var(--status-blocked); animation: dot-blink 1.1s steps(2) infinite; }\n.agent-card[data-state=\"done\"]    .status-bar { color: var(--status-done); border-color: rgba(100,255,218,0.30); }\n.agent-card[data-state=\"done\"]    .status-bar .sdot { background: var(--status-done); box-shadow: 0 0 5px var(--status-done); }\n.agent-card[data-state=\"idle\"]    .status-bar .sdot { background: var(--status-idle); opacity: 0.6; }\n.agent-card[data-state=\"offline\"] .status-bar { color: var(--status-offline); }\n.agent-card[data-state=\"offline\"] .status-bar .sdot { background: var(--status-offline); }\n\n.lock-glyph {\n  font-family: 'JetBrains Mono', monospace; font-size: 10px;\n  color: var(--status-blocked); letter-spacing: 0.1em;\n}\n\n.inst-badge {\n  display: inline-flex; align-items: center; gap: 5px;\n  font-family: 'JetBrains Mono', monospace; font-size: 10px;\n  color: var(--muted);\n  background: transparent;\n  border: 1px solid var(--border);\n  padding: 3px 7px;\n  cursor: pointer;\n  letter-spacing: 0.08em;\n  transition: all 120ms ease;\n}\n.inst-badge:hover { color: var(--accent); border-color: var(--accent-border); }\n.inst-badge .ib-num { color: var(--text); font-weight: 600; }\n\n/* MICRO META — model/cli/last_seen/skills inline strip */\n.meta-strip {\n  display: flex; align-items: center; flex-wrap: wrap;\n  gap: 4px 12px;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  color: var(--muted);\n  border-top: 1px solid var(--border-subtle);\n  border-bottom: 1px solid var(--border-subtle);\n  padding: 8px 0;\n}\n.meta-strip .m-item { display: inline-flex; align-items: baseline; gap: 5px; }\n.meta-strip .m-key {\n  font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--muted); opacity: 0.55;\n}\n.meta-strip .m-val { color: var(--text); }\n.meta-strip .m-val.linkish { cursor: pointer; border-bottom: 1px dotted var(--border); padding-bottom: 1px; transition: color 120ms; }\n.meta-strip .m-val.linkish::after { content: \" ▾\"; font-size: 8px; color: var(--muted); opacity: 0.7; }\n.meta-strip .m-val.linkish:hover { color: var(--accent); }\n.meta-strip .sep { color: var(--border); opacity: 0.7; }\n\n/* PANE / STDOUT block */\n.pane-wrap { position: relative; }\n.pane-label {\n  display: flex; align-items: center; justify-content: space-between;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--muted);\n  opacity: 0.7;\n  margin-bottom: 5px;\n}\n.pane-label .lc { display: inline-flex; gap: 6px; align-items: center; }\n.pane-label .lc::before { content: \"▸\"; color: var(--accent); opacity: 0.8; }\n.task-tag {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.06em;\n  color: var(--muted);\n}\n.agent-card[data-state=\"running\"] .task-tag { color: var(--accent); }\n.agent-card[data-state=\"done\"]    .task-tag { color: var(--status-done); }\n.agent-card[data-state=\"blocked\"] .task-tag { color: var(--status-blocked); }\n.task-tag .caret {\n  display: inline-block; width: 6px; height: 11px; background: currentColor;\n  margin-left: 4px; vertical-align: -2px;\n  animation: caret-blink 1.05s steps(2) infinite;\n}\n\n.pane {\n  position: relative;\n  background:\n    linear-gradient(180deg, rgba(0,240,255,0.025), rgba(0,240,255,0) 60%),\n    var(--bg);\n  border: 1px solid var(--border-subtle);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11.5px;\n  line-height: 1.55;\n  color: var(--text);\n  padding: 10px 12px 12px;\n  height: 64px;\n  overflow: hidden;\n  -webkit-mask-image: linear-gradient(180deg, #000 0, #000 70%, transparent 100%);\n          mask-image: linear-gradient(180deg, #000 0, #000 70%, transparent 100%);\n}\n:root[data-theme=\"light\"] .pane { background: #fbfcfd; }\n.pane .prompt { color: var(--accent); margin-right: 6px; }\n.agent-card[data-state=\"blocked\"] .pane .prompt { color: var(--status-blocked); }\n.agent-card[data-state=\"done\"] .pane .prompt { color: var(--status-done); }\n.pane .dim { color: var(--muted); }\n.pane .hi  { color: var(--accent); }\n.pane .ok  { color: var(--status-done); }\n.pane .warn { color: var(--status-blocked); }\n\n/* Scan line — running only */\n.agent-card[data-state=\"running\"] .pane::after {\n  content: \"\";\n  position: absolute; left: 0; right: 0; top: -10%;\n  height: 14px;\n  background: linear-gradient(180deg, transparent, rgba(0,240,255,0.18), transparent);\n  pointer-events: none;\n  animation: scan 3.4s linear infinite;\n}\n\n/* SPARKLINE — heatmap telemetry, 24 cells */\n.spark-wrap { display: flex; flex-direction: column; gap: 4px; }\n.spark-head {\n  display: flex; align-items: center; justify-content: space-between;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--muted); opacity: ======\n   RENDER\n   ============================================================ */\nfunction renderSpark(values, state) {\n  const max = Math.max(...values, 1);\n  const peak = max;\n  const color = ({\n    running: 'var(--status-running)',\n    idle:    'var(--status-idle)',\n    blocked: 'var(--status-blocked)',\n    done:    'var(--status-done)',\n    offline: 'var(--status-offline)',\n  })[state];\n  const lastIdx = values.length - 1;\n  const cells = values.map((v, i) => {\n    const ratio = max ? (v / max) : 0;\n    let alpha = ratio < 0.01 ? 0.06 : (0.18 + ratio * 0.72);\n    if (state === 'offline') alpha = ratio < 0.01 ? 0.05 : (0.12 + ratio * 0.25);\n    if (state === 'idle' && ratio < 0.01) alpha = 0.06;\n    const bg = `color-mix(in oklab, ${color} ${Math.round(alpha*100)}%, transparent)`;\n    const nowClass = (i === lastIdx && (state === 'running' || state === 'done' || state === 'blocked')) ? ' now' : '';\n    return `<span class=\"cell${nowClass}\" style=\"--cell: ${bg}\"><\u002Fspan>`;\n  }).join('');\n  return { html: cells, peak };\n}\n\nfunction paneLabel(state, taskId, expanded) {\n  let lbl;\n  if (state === 'running')      lbl = expanded ? 'STDOUT // PANE.002' : 'STDOUT // PANE.001';\n  else if (state === 'idle')    lbl = 'STDOUT // PANE.001 · idle';\n  else if (state === 'blocked') lbl = 'STDIN // AWAIT.HUMAN';\n  else if (state === 'done')    lbl = 'STDOUT // EXIT.0';\n  else                          lbl = 'STDOUT // OFFLINE';\n  return lbl;\n}\n\nfunction buildHeader(a) {\n  const stateBadge = `\n    <div class=\"status-bar\">\n      <span class=\"sdot\"><\u002Fspan>\n      <span>${STATE_LABEL[a.state]}<\u002Fspan>\n      ${a.state === 'blocked' ? '<span class=\"lock-glyph\">⌧<\u002Fspan>' : ''}\n    <\u002Fdiv>`;\n  return `\n    <div class=\"card-head\">\n      <div class=\"avatar\">${initialsOf(a.name)}<\u002Fdiv>\n      <div class=\"head-text\">\n        <div class=\"head-toprow\">\n          <span class=\"agent-name\">${a.name}<\u002Fspan>\n          <span class=\"agent-slug\">${a.slug}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"agent-role\">${a.role}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"status-block\">\n        ${stateBadge}\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction buildMeta(a) {\n  const cli = a.cli === 'cc' ? 'cc' : 'codex';\n  const lseen = `<span class=\"lseen-val\">${a.lastSeen}<\u002Fspan>`;\n  return `\n    <div class=\"meta-strip\">\n      <span class=\"m-item\"><span class=\"m-key\">MDL<\u002Fspan><span class=\"m-val linkish\" data-act=\"model\">${a.model}<\u002Fspan><\u002Fspan>\n      <span class=\"sep\">│<\u002Fspan>\n      <span class=\"m-item\"><span class=\"m-key\">CLI<\u002Fspan><span class=\"m-val\">${cli}<\u002Fspan><\u002Fspan>\n      <span class=\"sep\">│<\u002Fspan>\n      <span class=\"m-item\"><span class=\"m-key\">LSEEN<\u002Fspan><span class=\"m-val\">${lseen}<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>`;\n}\n\nfunction buildPane(a, paneHTML, taskId) {\n  const showCaret = a.state === 'running';\n  const tag = taskId\n    ? `<span class=\"task-tag\">↳ ${taskId}${showCaret ? '<span class=\"caret\"><\u002Fspan>' : ''}<\u002Fspan>`\n    : `<span class=\"task-tag\" style=\"color:var(--muted); opacity:0.5\">↳ —<\u002Fspan>`;\n  return `\n    <div class=\"pane-wrap\">\n      <div class=\"pane-label\">\n        <span class=\"lc\">${paneLabel(a.state, taskId, a.expanded)}<\u002Fspan>\n        ${tag}\n      <\u002Fdiv>\n      <div class=\"pane\">${paneHTML}<\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction buildSpark(a, values) {\n  const { html, peak } = renderSpark(values, a.state);\n  return `\n    <div class=\"spark-wrap\">\n      <div class=\"spark-head\">\n        <span>EVT // 24H<\u002Fspan>\n        <span class=\"right\">\n          <span>PEAK <span class=\"peak\">${peak}<\u002Fspan><\u002Fspan>\n          <span>Δ ${values[values.length-1] - values[0] >= 0 ? '+' : ''}${values[values.length-1] - values[0]}<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"spark\">${html}<\u002Fdiv>\n      <div class=\"spark-axis\">\n        <span>-24H<\u002Fspan><span>-18H<\u002Fspan><span>-12H<\u002Fspan><span>-06H<\u002Fspan><span>NOW<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction buildFoot(a, instanceN) {\n  const n = instanceN || 1;\n  const badge = !a.expanded\n    ? `<button class=\"foot-badge mono\" data-act=\"expand\" title=\"${a.instances > 1 ? 'expandir instâncias' : 'instância única'}\">[<span class=\"fb-n\">${a.instances}<\u002Fspan>]<\u002Fbutton>`\n    : '';\n  return `\n    <div class=\"card-foot\">\n      <span>${a.cli === 'cc' ? 'CLAUDE.CODE' : 'CODEX.GPT'} · tmux:${a.slug}-${n}<\u002Fspan>\n      <span class=\"right\">\n        ${badge}\n        <button class=\"skill-chip mono\" data-act=\"skills\">${a.skills} SKILLS<\u002Fbutton>\n      <\u002Fspan>\n    <\u002Fdiv>`;\n}\n\nfunction buildPills(a) {\n  const pills = a.pills.map(p => {\n    const sel = p.id === a.selected ? 'true' : 'false';\n    return `<button class=\"pill\" role=\"tab\" aria-selected=\"${sel}\" data-pstate=\"${p.state}\" data-pill=\"${p.id}\"><span class=\"pdot\"><\u002Fspan><span>${p.id}<\u002Fspan><\u002Fbutton>`;\n  }).join('');\n  return `\n    <div class=\"instance-row\">\n      <span class=\"row-label\">INSTANCES · ×${a.instances}<\u002Fspan>\n      ${pills}\n      <button class=\"pill-add\" title=\"abrir nova instância\">+ NEW<\u002Fbutton>\n    <\u002Fdiv>`;\n}\n\nfunction renderCard(a) {\n  const card = document.createElement('div');\n  card.className = 'agent-card' + (a.expanded ? ' expanded' : '');\n  card.dataset.state = a.state;\n\n  let pillsBlock = '';\n  let activePane = a.paneHTML;\n  let activeTask = a.taskId;\n  let activeSparkKey = a.state;\n  let instanceN = 1;\n\n  if (a.expanded) {\n    pillsBlock = buildPills(a);\n    const sel = a.pills.find(p => p.id === a.selected);\n    activePane = sel.paneHTML;\n    activeTask = sel.taskId;\n    instanceN = parseInt(sel.id.split('-').pop(), 10) || 1;\n    a = { ...a, state: sel.state };\n    card.dataset.state = sel.state;\n    activeSparkKey = 'multi';\n  }\n\n  card.innerHTML = `\n    <div class=\"rail\"><\u002Fdiv>\n    <div class=\"card-body\">\n      ${pillsBlock}\n      ${buildHeader(a)}\n      ${buildMeta(a)}\n      ${buildPane(a, activePane, activeTask)}\n      ${buildSpark(a, SPARKS[activeSparkKey])}\n      ${buildFoot(a, instanceN)}\n    <\u002Fdiv>\n  `;\n\n  if (a.expanded) {\n    card.classList.add('span-2');\n    card.querySelectorAll('.pill[data-pill]').forEach(p => {\n      p.addEventListener('click', () => {\n        const data = expanded;\n        data.selected = p.dataset.pill;\n        const idx = ALL.indexOf(data);\n        const fresh = renderCard(data);\n        card.replaceWith(fresh);\n        ALL[idx] = data;\n      });\n    });\n  }\n\n  return card;\n}\n\nconst ALL = [...cards, expanded];\nconst grid = document.getElementById('cards');\nALL.forEach(a => grid.appendChild(renderCard(a)));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
